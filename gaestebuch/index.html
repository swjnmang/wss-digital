<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Gästebuch</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page">
    <header class="page-header">
      <h1>Digitales Gästebuch</h1>
      <p class="subtitle">Tragt euch ein und hinterlasst ein paar Zeilen – gerne auch mit Foto!</p>
    </header>

    <main class="layout">
      <section class="form-card" id="formStep">
        <form id="entryForm">
          <label for="nameInput">Euer Name</label>
          <input id="nameInput" type="text" maxlength="60" placeholder="Vorname Nachname" required autocomplete="off">

          <label for="messageInput">Eure Nachricht</label>
          <textarea id="messageInput" maxlength="500" rows="4" placeholder="Schreibt ein paar schöne Worte für das Brautpaar..." required></textarea>

          <label for="photoCapture">Foto (optional)</label>
          <div class="photo-buttons">
            <label class="photo-btn" for="photoCapture">📷 Foto aufnehmen</label>
            <input id="photoCapture" type="file" accept="image/*" capture="environment" class="visually-hidden">
          </div>
          <img id="photoPreview" class="photo-preview hidden" alt="Vorschau">

          <button type="submit" id="submitBtn">Eintragen</button>
          <p id="formError" class="error hidden"></p>
        </form>
      </section>

      <section class="entries-card hidden" id="entriesStep">
        <p class="success">Danke für euren Eintrag – das Brautpaar wird sich riesig freuen! 💛</p>
        <h2>Bisherige Einträge</h2>
        <div id="entriesList" class="entries-list">
          <p class="empty">Noch keine Einträge.</p>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="script.js"></script>
</body>
</html>
