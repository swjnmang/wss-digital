<svg viewBox="0 0 1000 620" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <!-- Himmel -->
  <rect x="0" y="0" width="1000" height="620" fill="#f0f9ff"/>

  <!-- Sonne -->
  <circle cx="92" cy="84" r="30" fill="#fbbf24"/>
  <g stroke="#fbbf24" stroke-width="4" stroke-linecap="round">
    <line x1="92" y1="34" x2="92" y2="18"/>
    <line x1="92" y1="134" x2="92" y2="150"/>
    <line x1="42" y1="84" x2="26" y2="84"/>
    <line x1="142" y1="84" x2="158" y2="84"/>
    <line x1="57" y1="49" x2="46" y2="38"/>
    <line x1="127" y1="119" x2="138" y2="130"/>
    <line x1="57" y1="119" x2="46" y2="130"/>
    <line x1="127" y1="49" x2="138" y2="38"/>
  </g>

  <!-- Bergmassiv -->
  <polygon points="0,548 60,532 90,524 400,396 575,437 700,162 730,150 762,168 860,300 1000,470 1000,620 0,620"
           fill="#e2e8f0" opacity="0.85"/>
  <!-- Schneekappe -->
  <polygon points="688,182 730,150 770,178 752,194 712,196" fill="#ffffff"/>

  <!-- Wildschutzzone (Dreieck BXY) -->
  <polygon points="714,172 950,470 760,500" fill="#dcfce7" stroke="none" opacity="0.9"/>
  <text x="810" y="415" font-size="15" fill="#15803d" font-style="italic" text-anchor="middle">Schutzzone</text>
  <!-- kleine Baeume in der Schutzzone -->
  <g>
    <polygon points="800,340 789,368 811,368" fill="#16a34a"/>
    <rect x="797" y="368" width="6" height="8" fill="#78552b"/>
    <polygon points="850,430 839,458 861,458" fill="#16a34a"/>
    <rect x="847" y="458" width="6" height="8" fill="#78552b"/>
  </g>

  <!-- Baeume im Tal -->
  <g>
    <polygon points="145,506 130,546 160,546" fill="#16a34a"/>
    <rect x="141" y="546" width="8" height="10" fill="#78552b"/>
    <polygon points="185,516 172,550 198,550" fill="#16a34a"/>
    <rect x="181" y="550" width="8" height="9" fill="#78552b"/>
  </g>

  <!-- Dreieck Sektion 1: T-F-M -->
  <polygon points="80,520 400,520 400,392" fill="#dbeafe" opacity="0.75"/>
  <line x1="80" y1="520" x2="400" y2="520" stroke="#2563eb" stroke-width="2.5"/>
  <line x1="400" y1="520" x2="400" y2="392" stroke="#2563eb" stroke-width="2.5"/>
  <!-- Tragseil s1 (gesucht) -->
  <line x1="80" y1="520" x2="400" y2="392" stroke="#dc2626" stroke-width="3"/>
  <!-- Gondel am Seil -->
  <g>
    <line x1="240" y1="456" x2="240" y2="468" stroke="#475569" stroke-width="2.5"/>
    <rect x="228" y="468" width="24" height="18" rx="4" fill="#475569"/>
    <rect x="233" y="472" width="14" height="8" rx="2" fill="#f0f9ff"/>
  </g>
  <!-- rechter Winkel bei F -->
  <path d="M 385 520 L 385 505 L 400 505" fill="none" stroke="#475569" stroke-width="1.8"/>
  <circle cx="391" cy="512" r="1.8" fill="#475569"/>
  <!-- Winkel alpha bei T -->
  <path d="M 128 520 A 48 48 0 0 0 124.6 502.2" fill="none" stroke="#dc2626" stroke-width="2.5"/>
  <text x="143" y="512" font-size="19" fill="#dc2626" font-style="italic">&#945;</text>
  <!-- Beschriftungen Sektion 1 -->
  <text x="240" y="543" font-size="16" fill="#1d4ed8" text-anchor="middle">800 m</text>
  <text x="410" y="462" font-size="16" fill="#1d4ed8">320 m</text>
  <text x="196" y="440" font-size="16" fill="#dc2626" font-style="italic">s&#8321; = ?</text>

  <!-- Sektion 2: Sichtlinien M-P und P-B -->
  <line x1="400" y1="392" x2="575" y2="433" stroke="#64748b" stroke-width="2" stroke-dasharray="7 5"/>
  <line x1="575" y1="433" x2="714" y2="172" stroke="#64748b" stroke-width="2" stroke-dasharray="7 5"/>
  <!-- Tragseil s2 (gesucht) -->
  <line x1="400" y1="392" x2="714" y2="172" stroke="#dc2626" stroke-width="3"/>
  <!-- Winkel 48 bei M -->
  <path d="M 439 401 A 40 40 0 0 0 432.8 369.1" fill="none" stroke="#047857" stroke-width="2.5"/>
  <text x="452" y="388" font-size="16" fill="#047857">48&#176;</text>
  <!-- Winkel 105 bei P -->
  <path d="M 589.1 406.5 A 30 30 0 0 0 545.8 426.2" fill="none" stroke="#047857" stroke-width="2.5"/>
  <text x="551" y="390" font-size="16" fill="#047857">105&#176;</text>
  <!-- Beschriftungen Sektion 2 -->
  <text x="478" y="429" font-size="16" fill="#1d4ed8" text-anchor="middle" transform="rotate(13 478 429)">450 m</text>
  <text x="524" y="272" font-size="16" fill="#dc2626" font-style="italic">s&#8322; = ?</text>

  <!-- Pisten: B-X und B-Y und X-Y -->
  <line x1="714" y1="172" x2="950" y2="470" stroke="#2563eb" stroke-width="2.5"/>
  <line x1="714" y1="172" x2="760" y2="500" stroke="#2563eb" stroke-width="2.5"/>
  <line x1="950" y1="470" x2="760" y2="500" stroke="#2563eb" stroke-width="2.5"/>
  <!-- Winkel gamma bei B -->
  <path d="M 748.2 215.1 A 55 55 0 0 1 721.7 226.5" fill="none" stroke="#dc2626" stroke-width="2.5"/>
  <text x="741" y="252" font-size="19" fill="#dc2626" font-style="italic">&#947;</text>
  <!-- Beschriftungen Pisten -->
  <text x="858" y="312" font-size="16" fill="#1d4ed8">1500 m</text>
  <text x="748" y="352" font-size="16" fill="#1d4ed8">1300 m</text>
  <text x="862" y="507" font-size="16" fill="#1d4ed8">700 m</text>

  <!-- Stationsgebaeude -->
  <g>
    <rect x="58" y="500" width="22" height="20" fill="#334155"/>
    <polygon points="55,500 69,488 83,500" fill="#dc2626"/>
    <rect x="392" y="374" width="20" height="18" fill="#334155" transform="translate(-16 0)"/>
    <polygon points="373,374 386,363 399,374" fill="#dc2626"/>
    <rect x="694" y="152" width="20" height="18" fill="#334155" transform="translate(-14 2)"/>
    <polygon points="677,154 690,143 703,154" fill="#dc2626"/>
  </g>

  <!-- Huetten X und Y -->
  <g>
    <rect x="942" y="458" width="18" height="13" fill="#92600e"/>
    <polygon points="939,458 951,448 963,458" fill="#78350f"/>
    <rect x="750" y="489" width="18" height="13" fill="#92600e"/>
    <polygon points="747,489 759,479 771,489" fill="#78350f"/>
  </g>

  <!-- Punkte -->
  <g fill="#1d4ed8" stroke="#ffffff" stroke-width="1.5">
    <circle cx="80" cy="520" r="5"/>
    <circle cx="400" cy="520" r="5"/>
    <circle cx="400" cy="392" r="5"/>
    <circle cx="575" cy="433" r="5"/>
    <circle cx="714" cy="172" r="5"/>
    <circle cx="950" cy="470" r="5"/>
    <circle cx="760" cy="500" r="5"/>
  </g>

  <!-- Punktbeschriftungen -->
  <text x="66" y="562" font-size="18" fill="#0f172a" font-weight="bold">T</text>
  <text x="42" y="582" font-size="13" fill="#475569">Talstation</text>
  <text x="396" y="562" font-size="18" fill="#0f172a" font-weight="bold">F</text>
  <text x="352" y="386" font-size="18" fill="#0f172a" font-weight="bold" text-anchor="end">M</text>
  <text x="280" y="366" font-size="13" fill="#475569">Mittelstation</text>
  <text x="578" y="462" font-size="18" fill="#0f172a" font-weight="bold">P</text>
  <text x="560" y="481" font-size="13" fill="#475569">Messpunkt</text>
  <text x="700" y="136" font-size="18" fill="#0f172a" font-weight="bold">B</text>
  <text x="716" y="136" font-size="13" fill="#475569">Bergstation</text>
  <text x="968" y="476" font-size="18" fill="#0f172a" font-weight="bold">X</text>
  <text x="732" y="522" font-size="18" fill="#0f172a" font-weight="bold">Y</text>

  <!-- Hinweis -->
  <text x="985" y="608" font-size="13" fill="#94a3b8" font-style="italic" text-anchor="end">Skizze nicht ma&#223;stabsgetreu</text>
</svg>
