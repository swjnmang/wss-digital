<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100" height="100" fill="#00d4ff" rx="20"/>
  
  <!-- Puzzle pieces forming M shape -->
  <g fill="white" opacity="0.9">
    <!-- Left side of M -->
    <rect x="25" y="30" width="12" height="45" rx="3"/>
    <!-- Left middle peak -->
    <polygon points="35,30 42,40 42,30"/>
    <!-- Center valley -->
    <rect x="40" y="45" width="8" height="30" rx="3"/>
    <!-- Right middle peak -->
    <polygon points="50,30 58,40 58,30"/>
    <!-- Right side of M -->
    <rect x="63" y="30" width="12" height="45" rx="3"/>
  </g>
  
  <!-- Subtle glow -->
  <text x="50" y="72" font-size="60" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif" opacity="0.3">M</text>
</svg>
