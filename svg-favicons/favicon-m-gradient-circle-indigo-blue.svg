<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with indigo to deep blue gradient -->
  <defs>
    <linearGradient id="grad-indigo-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4c3fa0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066cc;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="100" height="100" fill="url(#grad-indigo-blue)" rx="20"/>
  
  <!-- Circle background for M -->
  <circle cx="50" cy="50" r="38" fill="white" opacity="0.15"/>
  
  <!-- M in white -->
  <text x="50" y="72" font-size="65" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">M</text>
</svg>
