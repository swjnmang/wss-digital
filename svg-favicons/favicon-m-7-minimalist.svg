<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100" height="100" fill="#333333" rx="20"/>
  
  <!-- Minimalist M with negative space -->
  <rect x="25" y="25" width="50" height="50" fill="none" stroke="white" stroke-width="2" rx="8"/>
  
  <!-- Left stroke of M -->
  <line x1="30" y1="40" x2="30" y2="70" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <!-- Peak left -->
  <line x1="30" y1="40" x2="42" y2="55" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <!-- Peak right -->
  <line x1="42" y1="55" x2="54" y2="40" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <!-- Valley -->
  <line x1="54" y1="40" x2="54" y2="55" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <!-- Right stroke -->
  <line x1="70" y1="40" x2="70" y2="70" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <!-- Right peak -->
  <line x1="70" y1="40" x2="62" y2="55" stroke="white" stroke-width="6" stroke-linecap="round"/>
</svg>
