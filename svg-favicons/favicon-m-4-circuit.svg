<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100" height="100" fill="#764ba2" rx="20"/>
  
  <!-- Circuit board pattern around M -->
  <circle cx="30" cy="30" r="3" fill="white" opacity="0.6"/>
  <circle cx="70" cy="30" r="3" fill="white" opacity="0.6"/>
  <circle cx="30" cy="70" r="3" fill="white" opacity="0.6"/>
  <circle cx="70" cy="70" r="3" fill="white" opacity="0.6"/>
  
  <line x1="30" y1="30" x2="50" y2="50" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="70" y1="30" x2="50" y2="50" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="50" y1="50" x2="30" y2="70" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="50" y1="50" x2="70" y2="70" stroke="white" stroke-width="1" opacity="0.4"/>
  
  <!-- Large M -->
  <text x="50" y="72" font-size="65" font-weight="900" fill="white" text-anchor="middle" font-family="Arial, sans-serif">M</text>
</svg>
