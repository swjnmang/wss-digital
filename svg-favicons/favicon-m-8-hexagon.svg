<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100" height="100" fill="#764ba2" rx="20"/>
  
  <!-- Hexagon containers forming M -->
  <!-- Left hexagon -->
  <polygon points="28,35 35,30 42,35 42,50 35,55 28,50" fill="white" opacity="0.15"/>
  <polygon points="28,55 35,50 42,55 42,70 35,75 28,70" fill="white" opacity="0.25"/>
  
  <!-- Center hexagons -->
  <polygon points="45,25 52,20 59,25 59,40 52,45 45,40" fill="#ffd700" opacity="0.9"/>
  <polygon points="45,48 52,43 59,48 59,63 52,68 45,63" fill="white" opacity="0.25"/>
  
  <!-- Right hexagons -->
