<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Kreuzworträtsel | WSS digital</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page">
    <header class="page-header">
      <h1>Kreuzworträtsel</h1>
      <p class="subtitle">Trage die Lösungsbuchstaben ein – richtige Felder werden grün, falsche rot.</p>
    </header>

    <main class="layout">
      <section class="grid-wrap">
        <div id="crossword" class="crossword" aria-label="Kreuzworträtsel-Gitter"></div>
      </section>
    </main>
  </div>

  <div id="winOverlay" class="overlay hidden">
    <div class="overlay-box">
      <div id="nameStep">
        <h2>🎉 Geschafft!</h2>
        <p>Du hast das Kreuzworträtsel vollständig richtig gelöst. Trag dich für den Highscore ein:</p>
        <form id="nameForm">
          <input id="nameInput" type="text" maxlength="30" placeholder="Dein Name" required autocomplete="off">
          <button type="submit">Eintragen</button>
        </form>
        <p id="nameFormError" class="error hidden"></p>
      </div>

      <div id="highscoreStep" class="hidden">
        <h2>🏆 Highscore</h2>
        <p class="hint">Wer das Rätsel als Erstes vollständig gelöst hat, steht oben.</p>
        <ol id="highscoreList" class="highscore-list">
          <li class="empty">Noch keine Einträge.</li>
        </ol>
        <button id="closeOverlay" class="secondary-btn" type="button">Schließen</button>
      </div>
    </div>
  </div>

  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="script.js"></script>
</body>
</html>
